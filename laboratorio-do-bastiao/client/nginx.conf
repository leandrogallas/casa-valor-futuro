server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # REST + Colyseus matchmaking
    location ~ ^/(auth|agentes|tarefas|artefatos|reunioes|relatorios|health|a2a|matchmake|\.well-known) {
        proxy_pass http://server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Assets estáticos — ^~ impede que regex abaixo roube esses paths
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Colyseus WebSocket room: /{processId}/{roomId}  (dois segmentos alfanumericos)
    location ~ "^/[A-Za-z0-9]{4,}/[A-Za-z0-9]{4,}" {
        proxy_pass http://server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Paginas explicitas
    location = /portal.html { try_files /portal.html =404; }
    location = /office.html { try_files /office.html =404; }
    location = /admin.html  { try_files /admin.html =404; }
    location = / { try_files /index.html =404; }

    # SPA fallback
    location / { try_files $uri $uri/ /index.html; }

    # Cache outros assets (woff, png, svg, ico)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
