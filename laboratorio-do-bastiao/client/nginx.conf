server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST/WS para o servidor Colyseus
    location ~ ^/(auth|agentes|tarefas|artefatos|reunioes|relatorios|health|a2a|\.well-known) {
        proxy_pass http://server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Páginas explícitas — sem fallback para index
    location = /portal.html {
        try_files /portal.html =404;
    }

    location = /office.html {
        try_files /office.html =404;
    }

    location = /admin.html {
        try_files /admin.html =404;
    }

    # Login (raiz)
    location = / {
        try_files /index.html =404;
    }

    # SPA fallback para o restante
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets estáticos (Vite gera nomes com hash)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
