server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy REST/WS para o servidor Colyseus
    location ~ ^/(auth|agentes|tarefas|artefatos|reunioes|relatorios|health) {
        proxy_pass http://server:2567;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin panel — arquivo específico
    location = /admin.html {
        try_files /admin.html =404;
    }

    # SPA fallback — serve index.html para rotas do jogo
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets estáticos (Vite gera nomes com hash)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
