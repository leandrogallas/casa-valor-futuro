<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Laboratório do Bastião</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:       #0d0e12;
        --surface:  #1a1b22;
        --border:   #2a2a4a;
        --accent:   #4dabf7;
        --accent2:  #51cf66;
        --danger:   #ff6b6b;
        --warn:     #fcc419;
        --text:     #e6e6e6;
        --muted:    #888;
        --sidebar-w: 200px;
      }

      html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

      /* Layout */
      #admin-layout { display: flex; height: 100vh; }

      #sidebar {
        width: var(--sidebar-w);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }

      #sidebar-logo {
        padding: 16px;
        font-weight: bold;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
        font-size: 13px;
      }

      #sidebar-logo small { display: block; color: var(--muted); font-weight: normal; font-size: 11px; margin-top: 2px; }

      #nav { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 2px; }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
        cursor: pointer;
        color: var(--muted);
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-size: 13px;
        transition: background 0.15s;
      }

      .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
      .nav-item.active { background: rgba(77,171,247,0.15); color: var(--accent); }

      #sidebar-footer {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
      }

      #back-link {
        font-size: 12px;
        color: var(--muted);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      #back-link:hover { color: var(--text); }

      /* Main content */
      #main {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      #page-title {
        font-size: 20px;
        font-weight: bold;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #page-title .badge {
        font-size: 12px;
        padding: 2px 8px;
        background: rgba(77,171,247,0.15);
        color: var(--accent);
        border-radius: 12px;
        font-weight: normal;
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }

      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .card-title { font-size: 13px; font-weight: bold; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

      /* Buttons */
      .btn {
        padding: 6px 14px;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.15s;
      }
      .btn:hover { opacity: 0.85; }
      .btn-primary { background: var(--accent); color: #0d0e12; }
      .btn-danger  { background: var(--danger); color: #fff; }
      .btn-ghost   { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); }
      .btn-sm { padding: 4px 10px; font-size: 12px; }

      /* Table */
      table { width: 100%; border-collapse: collapse; }
      th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border); }
      td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
      tr:last-child td { border-bottom: none; }
      tr:hover td { background: rgba(255,255,255,0.02); }

      /* Badges */
      .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
      .badge-green   { background: rgba(81,207,102,0.15); color: var(--accent2); }
      .badge-blue    { background: rgba(77,171,247,0.15); color: var(--accent); }
      .badge-yellow  { background: rgba(252,196,25,0.15); color: var(--warn); }
      .badge-red     { background: rgba(255,107,107,0.15); color: var(--danger); }
      .badge-gray    { background: rgba(255,255,255,0.08); color: var(--muted); }

      /* Forms */
      .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .form-grid.full { grid-template-columns: 1fr; }

      .field { display: flex; flex-direction: column; gap: 5px; }
      .field label { font-size: 12px; color: var(--muted); font-weight: 500; }

      .field input, .field select, .field textarea {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
        width: 100%;
        font-family: inherit;
        transition: border-color 0.15s;
      }
      .field textarea { resize: vertical; min-height: 80px; }
      .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
      .field input::placeholder, .field textarea::placeholder { color: #444; }

      .field select option { background: var(--surface); }

      /* Modal */
      #modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        backdrop-filter: blur(2px);
      }
      #modal-overlay.open { display: flex; }

      #modal-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        width: 560px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      #modal-title { font-size: 16px; font-weight: bold; }

      .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }

      /* Feedback */
      .msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; }
      .msg-ok  { background: rgba(81,207,102,0.1); color: var(--accent2); border: 1px solid rgba(81,207,102,0.3); }
      .msg-err { background: rgba(255,107,107,0.1); color: var(--danger); border: 1px solid rgba(255,107,107,0.3); }

      /* Loading */
      .loading { color: var(--muted); font-size: 13px; padding: 20px 0; text-align: center; }

      /* Stats row */
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
      }
      .stat-val { font-size: 28px; font-weight: bold; color: var(--accent); }
      .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

      /* Skin preview */
      .skin-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }

      /* Routine form */
      .rotina-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

      /* Reports */
      .report-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
      .report-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .report-content { font-size: 12px; color: #ccc; line-height: 1.6; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="admin-layout">
      <aside id="sidebar">
        <div id="sidebar-logo">
          ⚙️ Admin
          <small>Laboratório do Bastião</small>
        </div>
        <nav id="nav">
          <button class="nav-item active" data-page="agentes">🤖 Agentes</button>
          <button class="nav-item" data-page="tarefas">📋 Tarefas</button>
          <button class="nav-item" data-page="reunioes">📅 Reuniões</button>
          <button class="nav-item" data-page="relatorios">📊 Relatórios</button>
        </nav>
        <div id="sidebar-footer">
          <a href="/" id="back-link">← Voltar ao escritório</a>
        </div>
      </aside>

      <main id="main">
        <div class="loading">Carregando...</div>
      </main>
    </div>

    <!-- Modal genérico -->
    <div id="modal-overlay">
      <div id="modal-box">
        <div id="modal-title"></div>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm">Salvar</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/admin/main.ts"></script>
  </body>
</html>
