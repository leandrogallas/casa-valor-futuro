<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratório do Bastião</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: #0d0e12;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        height: 100%;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }

      /* ── Chat overlay ── */
      #chat-overlay {
        position: fixed;
        bottom: 12px;
        right: 12px;
        width: 300px;
        background: rgba(13, 14, 18, 0.88);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(4px);
      }

      #chat-messages {
        height: 180px;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a4a transparent;
      }

      .chat-msg {
        font-size: 12px;
        line-height: 1.4;
        word-break: break-word;
      }

      .chat-time { color: #666; margin-right: 4px; }
      .chat-autor { color: #4dabf7; font-weight: bold; margin-right: 4px; }
      .chat-texto { color: #ddd; }

      #chat-input-row {
        display: flex;
        border-top: 1px solid #2a2a4a;
        padding: 4px;
        gap: 4px;
      }

      #chat-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #e6e6e6;
        font-size: 12px;
        padding: 4px;
      }

      #chat-input::placeholder { color: #555; }

      #chat-send {
        background: #4dabf7;
        border: none;
        border-radius: 4px;
        color: #0d0e12;
        font-size: 14px;
        font-weight: bold;
        padding: 2px 8px;
        cursor: pointer;
      }

      #chat-send:hover { background: #74c0fc; }

      /* ── Task Board overlay ── */
      #task-board {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 340px;
        max-height: 520px;
        background: rgba(13, 14, 18, 0.92);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(4px);
        overflow: hidden;
      }

      #tb-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid #2a2a4a;
        font-size: 13px;
        font-weight: bold;
        color: #aac4ff;
      }

      #tb-hint { flex: 1; font-size: 10px; color: #555; background: none; border: none; }
      #tb-close { margin-left: auto; background: none; border: none; color: #888; cursor: pointer; font-size: 14px; }
      #tb-close:hover { color: #ff6b6b; }

      #tb-tabs {
        display: flex;
        border-bottom: 1px solid #2a2a4a;
      }

      .tb-tab {
        flex: 1;
        padding: 6px;
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 12px;
        border-bottom: 2px solid transparent;
      }

      .tb-tab.active { color: #4dabf7; border-bottom-color: #4dabf7; }
      .tb-tab:hover:not(.active) { color: #ccc; }

      .tb-panel {
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 420px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a4a transparent;
      }

      .tb-task {
        background: rgba(255,255,255,0.04);
        border: 1px solid #2a2a4a;
        border-radius: 6px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tb-task-top { display: flex; align-items: center; gap: 6px; }
      .tb-task-titulo { flex: 1; font-size: 12px; font-weight: bold; color: #e6e6e6; word-break: break-word; }
      .tb-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #0d0e12; white-space: nowrap; font-weight: bold; }
      .tb-task-desc { font-size: 11px; color: #aaa; word-break: break-word; }
      .tb-task-foot { display: flex; align-items: center; gap: 6px; }
      .tb-prio { font-size: 10px; color: #666; text-transform: capitalize; }
      .tb-status-sel { margin-left: auto; font-size: 11px; background: #1a1b22; border: 1px solid #3a3a5a; color: #ccc; border-radius: 4px; padding: 2px 4px; cursor: pointer; }

      /* Create form */
      #tb-create input, #tb-create textarea, #tb-create select {
        width: 100%;
        background: #1a1b22;
        border: 1px solid #2a2a4a;
        border-radius: 4px;
        color: #e6e6e6;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        resize: vertical;
      }

      #tb-create input::placeholder, #tb-create textarea::placeholder { color: #555; }
      #tb-submit { width: 100%; padding: 7px; background: #4dabf7; border: none; border-radius: 4px; color: #0d0e12; font-weight: bold; font-size: 13px; cursor: pointer; }
      #tb-submit:hover { background: #74c0fc; }

      .tb-info { color: #555; font-size: 12px; text-align: center; margin: 16px 0; }
      .tb-erro { color: #ff6b6b; font-size: 12px; }
      .tb-ok   { color: #51cf66; font-size: 12px; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
