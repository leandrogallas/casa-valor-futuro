<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratório do Bastião</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: #0d0e12;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        height: 100%;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }

      /* ── Chat overlay ── */
      #chat-overlay {
        position: fixed;
        bottom: 12px;
        right: 12px;
        width: 300px;
        background: rgba(13, 14, 18, 0.88);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(4px);
      }

      #chat-messages {
        height: 180px;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a4a transparent;
      }

      .chat-msg {
        font-size: 12px;
        line-height: 1.4;
        word-break: break-word;
      }

      .chat-time { color: #666; margin-right: 4px; }
      .chat-autor { color: #4dabf7; font-weight: bold; margin-right: 4px; }
      .chat-texto { color: #ddd; }

      #chat-input-row {
        display: flex;
        border-top: 1px solid #2a2a4a;
        padding: 4px;
        gap: 4px;
      }

      #chat-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #e6e6e6;
        font-size: 12px;
        padding: 4px;
      }

      #chat-input::placeholder { color: #555; }

      #chat-send {
        background: #4dabf7;
        border: none;
        border-radius: 4px;
        color: #0d0e12;
        font-size: 14px;
        font-weight: bold;
        padding: 2px 8px;
        cursor: pointer;
      }

      #chat-send:hover { background: #74c0fc; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
