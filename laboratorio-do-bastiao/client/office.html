<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratório do Bastião — Escritório</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: #0d0e12;
        color: #e6e6e6;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        height: 100%;
      }

      /* ── Top bar ── */
      #office-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 40px;
        background: rgba(8,11,18,0.9);
        border-bottom: 1px solid #1e2d42;
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 12px;
        z-index: 2000;
        backdrop-filter: blur(8px);
      }

      .bar-logo { font-size: 13px; font-weight: 700; color: #3b82f6; }
      .bar-sep  { flex: 1; }

      .bar-btn {
        padding: 4px 12px;
        border-radius: 6px;
        border: 1px solid #1e2d42;
        background: transparent;
        color: #94a3b8;
        font-size: 11px;
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
        display: flex; align-items: center; gap: 6px;
      }
      .bar-btn:hover { background: #0f1623; color: #f1f5f9; }

      .bar-user {
        font-size: 11px;
        color: #64748b;
        padding: 0 8px;
        display: flex; align-items: center; gap: 6px;
      }

      .bar-user-dot {
        width: 20px; height: 20px;
        border-radius: 50%;
        background: #3b82f6;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px;
        font-weight: 700;
        color: #fff;
      }

      #game {
        width: 100vw;
        height: 100vh;
        padding-top: 40px;
      }

      /* ── Chat overlay ── */
      #chat-overlay {
        position: fixed;
        bottom: 12px;
        right: 12px;
        width: 300px;
        background: rgba(13, 14, 18, 0.88);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(4px);
      }

      #chat-messages {
        height: 180px;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a4a transparent;
      }

      .chat-msg { font-size: 12px; line-height: 1.4; word-break: break-word; }
      .chat-time { color: #666; margin-right: 4px; }
      .chat-autor { color: #4dabf7; font-weight: bold; margin-right: 4px; }
      .chat-texto { color: #ddd; }

      #chat-input-row {
        display: flex;
        border-top: 1px solid #2a2a4a;
        padding: 4px;
        gap: 4px;
      }

      #chat-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #e6e6e6;
        font-size: 12px;
        padding: 4px;
      }
      #chat-input::placeholder { color: #555; }

      #chat-send {
        background: #4dabf7;
        border: none;
        border-radius: 4px;
        color: #0d0e12;
        font-size: 14px;
        font-weight: bold;
        padding: 2px 8px;
        cursor: pointer;
      }
      #chat-send:hover { background: #74c0fc; }

      /* ── Task Board overlay ── */
      #task-board {
        position: fixed;
        top: 52px;
        left: 12px;
        width: 340px;
        max-height: 520px;
        background: rgba(13, 14, 18, 0.92);
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
        backdrop-filter: blur(4px);
        overflow: hidden;
      }

      #tb-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-bottom: 1px solid #2a2a4a;
        font-size: 13px;
        font-weight: bold;
        color: #aac4ff;
      }

      #tb-hint { flex: 1; font-size: 10px; color: #555; background: none; border: none; }
      #tb-close { margin-left: auto; background: none; border: none; color: #888; cursor: pointer; font-size: 14px; }
      #tb-close:hover { color: #ff6b6b; }

      #tb-tabs { display: flex; border-bottom: 1px solid #2a2a4a; }

      .tb-tab {
        flex: 1;
        padding: 6px;
        background: none;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 12px;
        border-bottom: 2px solid transparent;
      }
      .tb-tab.active { color: #4dabf7; border-bottom-color: #4dabf7; }
      .tb-tab:hover:not(.active) { color: #ccc; }

      .tb-panel {
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 420px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a4a transparent;
      }

      .tb-task {
        background: rgba(255,255,255,0.04);
        border: 1px solid #2a2a4a;
        border-radius: 6px;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tb-task-top  { display: flex; align-items: center; gap: 6px; }
      .tb-task-titulo { flex: 1; font-size: 12px; font-weight: bold; color: #e6e6e6; word-break: break-word; }
      .tb-badge     { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: #0d0e12; white-space: nowrap; font-weight: bold; }
      .tb-task-desc { font-size: 11px; color: #aaa; word-break: break-word; }
      .tb-task-foot { display: flex; align-items: center; gap: 6px; }
      .tb-prio      { font-size: 10px; color: #666; text-transform: capitalize; }
      .tb-status-sel { margin-left: auto; font-size: 11px; background: #1a1b22; border: 1px solid #3a3a5a; color: #ccc; border-radius: 4px; padding: 2px 4px; cursor: pointer; }

      #tb-create input, #tb-create textarea, #tb-create select {
        width: 100%;
        background: #1a1b22;
        border: 1px solid #2a2a4a;
        border-radius: 4px;
        color: #e6e6e6;
        font-size: 12px;
        padding: 6px 8px;
        outline: none;
        resize: vertical;
      }
      #tb-create input::placeholder, #tb-create textarea::placeholder { color: #555; }
      #tb-submit { width: 100%; padding: 7px; background: #4dabf7; border: none; border-radius: 4px; color: #0d0e12; font-weight: bold; font-size: 13px; cursor: pointer; }
      #tb-submit:hover { background: #74c0fc; }
      .tb-info { color: #555; font-size: 12px; text-align: center; margin: 16px 0; }
      .tb-erro { color: #ff6b6b; font-size: 12px; }
      .tb-ok   { color: #51cf66; font-size: 12px; }
    </style>
  </head>
  <body>
    <!-- Top navigation bar -->
    <div id="office-bar">
      <span class="bar-logo">🧪 Bastião</span>
      <a href="/portal.html" class="bar-btn">← Portal</a>
      <a href="/admin.html" class="bar-btn">⚙️ Admin</a>
      <div class="bar-sep"></div>
      <div class="bar-user">
        <div class="bar-user-dot" id="bar-initials">?</div>
        <span id="bar-nome"></span>
      </div>
      <button class="bar-btn" id="bar-logout">Sair</button>
    </div>

    <div id="game"></div>
    <script type="module" src="/src/office.ts"></script>
  </body>
</html>
