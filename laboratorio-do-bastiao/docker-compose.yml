services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-2567}:2567"
    environment:
      PORT: "2567"
      SQLITE_PATH: "/app/data/bastiao.db"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    volumes:
      - bastiao_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:2567/health').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        # VITE_SERVER_URL is baked into the JS bundle at build time.
        # For VPS: set to ws://<VPS_IP_OR_DOMAIN>:2567
        VITE_SERVER_URL: "${VITE_SERVER_URL:-ws://localhost:2567}"
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # Hermes orchestrator — runs ALL active agents simultaneously.
  # Start with: docker compose --profile hermes up -d hermes
  # Requires: ANTHROPIC_API_KEY in .env
  hermes:
    build:
      context: .
      dockerfile: agents/Dockerfile
    environment:
      HERMES_MODE: "true"
      SERVER_URL: "${SERVER_URL:-http://server:2567}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - hermes

  # Agent worker — one container per agent (legacy single-agent mode).
  # Start with: docker compose --profile agents up -d agent
  # Requires: AGENT_ID (UUID from POST /agentes) and ANTHROPIC_API_KEY.
  agent:
    build:
      context: .
      dockerfile: agents/Dockerfile
    environment:
      AGENT_ID: "${AGENT_ID}"
      SERVER_URL: "${SERVER_URL:-http://server:2567}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - agents

volumes:
  bastiao_data:
